[project]
name = "decord"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "pai-deps[build]",
]

[tool.uv.sources]
pai-deps = { path = "../..", editable = true }

[tool.uv.audit]
# Temporary until the package lock can move to setuptools >=83.0.0.
ignore = ["PYSEC-2026-3447"]
