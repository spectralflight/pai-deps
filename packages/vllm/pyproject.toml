[project]
name = "vllm"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "pai-deps[build]",
    # https://github.com/vllm-project/vllm/blob/main/pyproject.toml#L3
    "cmake>=3.26.1",
    "ninja",
    "packaging>=24.2",
    "setuptools>=77.0.3,<80.0.0",
    "setuptools-scm>=8.0",
    # Security lock target; actual build Torch is still selected by just/build/scripts/build-package.sh.
    "torch == 2.10.0",
    "wheel",
    "jinja2",
]

[tool.uv.sources]
pai-deps = { path = "../..", editable = true }

[tool.uv.audit]
# Suppress only no-fix PyTorch advisories. Strict audit runs with --no-config.
ignore-until-fixed = [
    "GHSA-rrmf-rvhw-rf47",
    "PYSEC-2026-139",
]
# Temporary until the package lock can move to setuptools >=83.0.0.
ignore = ["PYSEC-2026-3447"]
