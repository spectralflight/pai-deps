[project]
name = "cosmos-dummy"
version = "0.1.0"
requires-python = ">=3.10"
license = "Apache-2.0"
readme = "README.md"
dependencies = [
    "pai-deps[build]",
]

[tool.uv.sources]
pai-deps = { path = "../..", editable = true }

[build-system]
requires = ["uv_build>=0.8.12,<0.9.0"]
build-backend = "uv_build"
