[project]
name = "torchcodec"
version = "0.9.1"
requires-python = ">=3.10"
dependencies = [
    "pai-deps[build]",
    # Build dependencies for torchcodec
    "build>=1.3.0",
    "cmake>=3.26",
    "setuptools>=64",
    "pybind11>=2.11",
    "ninja",
]

[tool.uv.sources]
pai-deps = { path = "../..", editable = true }
